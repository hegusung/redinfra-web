# nginx reverse proxy — RedInfra Dashboard (app.py on :4444)
# Copier dans /etc/nginx/sites-available/redinfra et activer avec :
#   ln -s /etc/nginx/sites-available/redinfra /etc/nginx/sites-enabled/
#   nginx -t && systemctl reload nginx

server {
    listen 80;
    server_name redinfra.local;  # ← adapter (domaine ou IP)

    # Redirect HTTP → HTTPS (décommenter si TLS activé ci-dessous)
    # return 301 https://$host$request_uri;

    # ── Logs ──────────────────────────────────────────────────────────────────
    access_log /var/log/nginx/redinfra_access.log;
    error_log  /var/log/nginx/redinfra_error.log;

    # ── Sécurité de base ──────────────────────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header X-XSS-Protection       "1; mode=block" always;

    # ── Accès restreint (optionnel : whitelist IP) ────────────────────────────
    # allow 192.168.1.0/24;
    # deny all;

    # ── Proxy vers Flask ──────────────────────────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:4444;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # SSE / streaming (terminal output)
        proxy_set_header   Connection        "";
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 3600s;   # long timeout pour les runs Ansible/Terraform
    }
}

